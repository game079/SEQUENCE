<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>順序 (SEQUENCE)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        h1 { color: #1c1e21; }
        .menu { margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .btn-easy { background-color: #4caf50; color: white; }
        .btn-normal { background-color: #2196f3; color: white; }
        .btn-hard { background-color: #f44336; color: white; }
        button:hover { opacity: 0.8; }
        #game-board {
            display: grid;
            gap: 10px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .number-btn {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e4e6eb;
            color: #1c1e21;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
        }
        .number-btn.clicked {
            visibility: hidden;
        }
        .footer-link {
            margin-top: 30px;
            font-size: 12px;
        }
        .footer-link a {
            color: #65676b;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>順序 (SEQUENCE)</h1>
    
    <div class="menu">
        <button class="btn-easy" onclick="startGame(9, 3)">EASY</button>
        <button class="btn-normal" onclick="startGame(16, 4)">NORMAL</button>
        <button class="btn-hard" onclick="startGame(25, 5)">HARD</button>
    </div>

    <div id="game-board"></div>

    <div class="footer-link">
        <a href="privacy.html">プライバシーポリシー</a>
    </div>

    <script>
        let currentNumber = 1;
        let totalNumbers = 0;

        function startGame(count, grid) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${grid}, 1fr)`;
            currentNumber = 1;
            totalNumbers = count;

            let numbers = Array.from({length: count}, (_, i) => i + 1);
            numbers.sort(() => Math.random() - 0.5);

            numbers.forEach(num => {
                const btn = document.createElement('div');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.onclick = () => clickNumber(num, btn);
                board.appendChild(btn);
            });
        }

        function clickNumber(num, element) {
            if (num === currentNumber) {
                element.classList.add('clicked');
                if (currentNumber === totalNumbers) {
                    setTimeout(() => alert('クリア！おめでとうございます！'), 100);
                }
                currentNumber++;
            }
        }
    </script>
</body>
</html>
